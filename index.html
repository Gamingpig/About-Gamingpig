<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamingpig | Live Music Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xxs': '200px', 'xs': '320px' },
                    colors: { techBlue: '#3b82f6', techCyan: '#06b6d4' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700;900&family=JetBrains+Mono:wght=500;800&display=swap');
        
        :root {
            --apple-spring: cubic-bezier(0.32, 0.72, 0, 1);
            --apple-ease: cubic-bezier(0.25, 0.1, 0.25, 1);
            --liquid-fluid: cubic-bezier(0.25, 1, 0.35, 1.2);
            --shift-x: 0px;
            --shift-y: 0px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease;
        }

        /* --- OLED TRUE BLACK NIGHT MODE CRITICAL FIXES --- */
        body.oled-night-mode {
            background-color: #000000 !important;
        }
        body.oled-night-mode #ambient-bg-layer {
            opacity: 0.03 !important;
            filter: blur(160px) saturate(0.5) brightness(0.05) !important;
        }
        body.oled-night-mode .tv-overlay {
            opacity: 0.05;
        }
        body.oled-night-mode #cover-wrapper {
            box-shadow: 0 0px 40px rgba(0,0,0,1);
            border-color: rgba(255,255,255,0.02) !important;
            background-color: #000000 !important;
        }
        
        body.oled-night-mode #tv-artwork,
        body.oled-night-mode #tv-canvas-video {
            transition: filter 0.5s ease;
        }

        body.oled-night-mode h1, 
        body.oled-night-mode #tv-title {
            color: rgba(255, 255, 255, 0.45) !important;
            text-shadow: none !important;
        }
        body.oled-night-mode p, 
        body.oled-night-mode #tv-artist {
            color: rgba(255, 255, 255, 0.25) !important;
            text-shadow: none !important;
        }
        body.oled-night-mode .lyric-line {
            opacity: 0.05 !important;
        }
        body.oled-night-mode .lyric-line.active {
            opacity: 0.65 !important;
        }
        body.oled-night-mode .lyric-word {
            background: linear-gradient(to right, rgba(255,255,255,0.7) var(--fill-percent, 0%), rgba(255,255,255,0.1) var(--fill-percent, 0%)) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
        }
        body.oled-night-mode #status-badge, 
        body.oled-night-mode #spotify-badge,
        body.oled-night-mode #oled-toggle,
        body.oled-night-mode #dim-level-toggle,
        body.oled-night-mode #tv-progress-engine,
        body.oled-night-mode .eq-bars-wrapper {
            opacity: 0.15 !important;
            transition: opacity 0.3s ease;
        }
        body.oled-night-mode #status-badge:hover, 
        body.oled-night-mode #spotify-badge:hover,
        body.oled-night-mode #oled-toggle:hover,
        body.oled-night-mode #dim-level-toggle:hover,
        body.oled-night-mode #tv-progress-engine:hover,
        body.oled-night-mode .eq-bars-wrapper:hover {
            opacity: 0.6 !important;
        }
        body.oled-night-mode #tv-progress-bar {
            background: linear-gradient(to right, #1e40af, #0369a1) !important;
        }

        .burnin-protector {
            transform: translate3d(var(--shift-x), var(--shift-y), 0);
            transition: transform 1s ease-in-out;
        }

        #ambient-bg-layer {
            position: fixed; inset: -10%; z-index: 0;
            background-size: cover; background-position: center;
            filter: blur(80px) saturate(2.2) brightness(0.4);
            opacity: 0.85; transform: scale(1.1);
            will-change: transform, opacity;
            pointer-events: none;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }
        .playing #ambient-bg-layer {
            animation: slow-drift 25s infinite alternate ease-in-out;
        }
        @keyframes slow-drift {
            0% { transform: scale(1.1) rotate(0deg) translate3d(0,0,0); }
            50% { transform: scale(1.2) rotate(2deg) translate3d(-10px, 15px, 0); }
            100% { transform: scale(1.1) rotate(-2deg) translate3d(10px, -15px, 0); }
        }

        .tv-overlay {
            position: fixed; inset: 0; z-index: 5;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none; opacity: 0.4;
        }

        .lyric-line {
            opacity: 0.15; filter: blur(1px); transform: scale(0.95);
            transition: opacity 0.5s var(--apple-ease), filter 0.5s ease, transform 0.6s var(--liquid-fluid);
            transform-origin: left center;
            width: 100%;
            word-wrap: break-word;
            padding-right: 2rem;
        }
        .lyric-line.active {
            opacity: 1; filter: blur(0px); transform: scale(1.03);
        }
        .lyric-word {
            background: linear-gradient(to right, #ffffff var(--fill-percent, 0%), rgba(255,255,255,0.2) var(--fill-percent, 0%));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-weight: 900; letter-spacing: -0.03em;
            display: inline-block;
            white-space: pre-wrap;
        }

        .mask-image-gradient {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        #lyrics-container::-webkit-scrollbar { width: 0px; }

        .eq-bar { width: 4px; background: #22c55e; border-radius: 4px; transform-origin: bottom; }
        .playing .eq-bar { animation: eq-bounce ease alternate infinite; }
        @keyframes eq-bounce { 0% { transform: scaleY(0.1); } 100% { transform: scaleY(1); } }

        /* --- DYNAMISCHER ÜBERGANG FÜR CENTER-MODUS --- */
        #main-layout, #left-panel, #cover-wrapper, #right-panel {
            transition: all 0.8s cubic-bezier(0.25, 1, 0.35, 1);
        }
    </style>
</head>
<body class="text-slate-100 dark">

    <div id="ambient-bg-layer"></div>
    <div class="tv-overlay"></div>

    <main id="main-layout" class="relative z-10 w-full h-full flex flex-col md:flex-row items-center justify-between p-6 xs:p-8 md:p-16 lg:p-24 gap-8 md:gap-12 burnin-protector">
        
        <div id="left-panel" class="w-full md:w-[42%] flex flex-col items-center md:items-start text-center md:text-left justify-center shrink-0">
            
            <div class="flex flex-wrap items-center justify-center md:justify-start gap-3 mb-6 md:mb-10">
                <div id="status-badge" class="inline-flex items-center gap-2 px-3 py-1.5 text-[10px] xs:text-xs font-black tracking-widest text-emerald-400 uppercase bg-emerald-500/10 border border-emerald-500/20 rounded-full shadow-lg backdrop-blur-md">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span id="status-badge-text">Zen Mode</span>
                </div>

                <!-- Spotify Brand Badge -->
                <div id="spotify-badge" class="hidden inline-flex items-center gap-1.5 px-3 py-1.5 text-[10px] xs:text-xs font-bold tracking-wider text-[#1DB954] bg-[#1DB954]/10 border border-[#1DB954]/20 rounded-full shadow-lg backdrop-blur-md" title="Streaming via Spotify">
                    <svg class="w-3.5 h-3.5 fill-current text-[#1DB954]" viewBox="0 0 24 24">
                        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.982-.336.076-.67-.135-.746-.472-.076-.336.135-.67.472-.746 3.854-.88 7.15-.505 9.82 1.13.295.18.387.563.207.863zm1.224-2.724c-.226.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.082-1.182-.413.125-.847-.107-.972-.52-.125-.413.107-.847.52-.972 3.673-1.114 8.243-.574 11.35 1.34.367.226.487.707.26 1.074zm.106-2.833C14.392 8.76 8.5 8.567 5.12 9.592c-.52.158-1.072-.143-1.23-.663-.158-.52.143-1.07.663-1.23 3.885-1.18 10.38-.95 14.44 1.46.468.278.62.882.343 1.35-.277.468-.88.62-1.35.342z"/>
                    </svg>
                    <span>Spotify</span>
                </div>

                <button id="oled-toggle" class="px-3 py-1.5 text-[10px] xs:text-xs font-bold tracking-wider text-slate-300 uppercase bg-slate-800/40 border border-white/10 rounded-full hover:bg-slate-700/60 transition active:scale-95 backdrop-blur-md" title="OLED Night Mode umschalten">
                    ✨ Normal
                </button>

                <button id="dim-level-toggle" class="px-3 py-1.5 text-[10px] xs:text-xs font-bold tracking-wider text-slate-300 uppercase bg-slate-800/40 border border-white/10 rounded-full hover:bg-slate-700/60 transition active:scale-95 backdrop-blur-md" title="Dimming-Stufe für das Cover-Art wählen">
                    🌑 Dim: Bereit (Mittel)
                </button>
            </div>

            <div id="cover-wrapper" class="relative group w-[65vw] max-w-[260px] xs:max-w-[300px] md:max-w-[420px] aspect-square rounded-[2rem] md:rounded-[3rem] overflow-hidden shadow-[0_25px_60px_-15px_rgba(0,0,0,0.9)] bg-slate-900 border border-white/10 hover:scale-[1.02]">
                <img id="tv-artwork" class="w-full h-full object-cover opacity-0 transition-all duration-1000" alt="Album Art">
                <div id="tv-offline-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-5xl md:text-7xl bg-slate-950/60 backdrop-blur-md">🌙</div>
                <video id="tv-canvas-video" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-all duration-1000" loop muted playsinline></video>
            </div>

            <div class="mt-6 md:mt-10 w-full">
                <h1 id="tv-title" class="text-2xl xs:text-3xl md:text-5xl lg:text-6xl font-black tracking-tighter leading-tight text-white line-clamp-2 drop-shadow-md">Aktuell ist es ruhig...</h1>
                <p id="tv-artist" class="text-base xs:text-lg md:text-2xl lg:text-3xl text-white/70 font-semibold mt-2 line-clamp-1 drop-shadow-sm">Genieße die Stille</p>
            </div>

            <div id="tv-progress-engine" class="w-full mt-6 md:mt-10 opacity-60 transition-opacity hover:opacity-100 hidden">
                <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden relative">
                    <div id="tv-progress-bar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-500 to-cyan-400 w-0 transition-all duration-300 ease-linear rounded-full"></div>
                </div>
                <div class="flex justify-between text-xs xs:text-sm font-mono text-white/50 mt-3">
                    <span id="tv-time-current">0:00</span>
                    <span id="tv-time-total">0:00</span>
                </div>
            </div>
        </div>

        <div id="right-panel" class="w-full md:w-[54%] h-[50vh] md:h-full flex flex-col justify-center relative mask-image-gradient">
            <div id="lyrics-container" class="w-full h-full overflow-y-auto overscroll-behavior-contain pr-6 pl-2">
                <div id="lyrics-content-engine" class="flex flex-col items-start w-full transition-all duration-500"></div>
            </div>
        </div>
    </main>

    <div class="eq-bars-wrapper fixed bottom-4 right-4 z-50 opacity-20 hover:opacity-100 transition-opacity duration-300 flex items-center gap-4 bg-slate-900/60 p-2 rounded-2xl backdrop-blur-md border border-white/5">
        <div class="eq-bars flex gap-1 items-end h-4 px-2">
            <div class="eq-bar h-2" style="animation-duration: 0.4s"></div>
            <div class="eq-bar h-4" style="animation-duration: 0.6s"></div>
            <div class="eq-bar h-3" style="animation-duration: 0.5s"></div>
        </div>
        <input type="range" id="tv-sync-slider" min="-8000" max="2000" step="50" value="-4500" class="w-24 h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer" title="Sync Offset">
    </div>

    <script>
        // Standardwert für den API-Versatz deiner Node-Infrastruktur
        const DEFAULT_SYNC_OFFSET = -4500; 
        
        // DOM Handles
        const mBody = document.body;
        const mainLayout = document.getElementById('main-layout');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const coverWrapper = document.getElementById('cover-wrapper');
        const tvArtwork = document.getElementById('tv-artwork');
        const tvPlaceholder = document.getElementById('tv-offline-placeholder');
        const tvCanvasVideo = document.getElementById('tv-canvas-video');
        const tvTitle = document.getElementById('tv-title');
        const tvArtist = document.getElementById('tv-artist');
        const tvProgressBar = document.getElementById('tv-progress-bar');
        const tvTimeCurrent = document.getElementById('tv-time-current');
        const tvTimeTotal = document.getElementById('tv-time-total');
        const statusBadgeText = document.getElementById('status-badge-text');
        const lyricsContainer = document.getElementById('lyrics-container');
        const lyricsContentEngine = document.getElementById('lyrics-content-engine');
        const ambientBgLayer = document.getElementById('ambient-bg-layer');
        const tvSyncSlider = document.getElementById('tv-sync-slider');
        const oledToggleBtn = document.getElementById('oled-toggle');
        const dimToggleBtn = document.getElementById('dim-level-toggle');
        const tvProgressEngine = document.getElementById('tv-progress-engine');
        const spotifyBadge = document.getElementById('spotify-badge');

        // High-Performance Offscreen-Canvas (Wiederverwendbar zur Vermeidung von GC-Garbage)
        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });
        offscreenCanvas.width = 10;
        offscreenCanvas.height = 10;

        // State System
        let trackIsPlaying = false;
        let currentMs = 0;
        let totalMs = 0;
        let serverBaseProgress = 0;
        let localStartTime = 0;
        let currentTrackId = "";
        let parsedLyrics = [];
        let currentLyricIndex = -1;
        let liveSyncOffset = DEFAULT_SYNC_OFFSET;
        
        // --- HARDCORE TIMING & DRIFT MANAGEMENT CORE ---
        let lastPingLatency = 0;
        let apiTimeDelta = 0;

        // --- ADAPTIVE DIMMING STATE SYSTEM ---
        let currentDimLevelIndex = 1; // Startet standardmäßig auf "Mittel" (Index 1)
        const dimLevels = [
            { name: "Schwach", multiplier: 0.85 },
            { name: "Mittel", multiplier: 0.55 },
            { name: "Stark", multiplier: 0.25 }
        ];
        let detectedBrightness = 127; // Standardmäßig neutraler Grauwert für Fallbacks

        // Performance DOM-Cache zur Eliminierung von "querySelectorAll" im Animationsloop
        let lyricElementsCache = [];

        // --- 1. SEAMLESS TIME SYNCHRONIZATION ---
        async function syncWorldwideTime() {
            try {
                let startMs = performance.now();
                let res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=UTC');
                let data = await res.json();
                let latency = (performance.now() - startMs) / 2;
                apiTimeDelta = Date.now() - (new Date(data.dateTime + "Z").getTime() + latency);
            } catch(e) {
                try {
                    let startMs = performance.now();
                    let res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
                    let data = await res.json();
                    let latency = (performance.now() - startMs) / 2;
                    apiTimeDelta = Date.now() - (new Date(data.datetime).getTime() + latency);
                } catch(err) { 
                    console.warn("WorldTime Sync failed, tracking via native epoch."); 
                }
            }
        }

        // --- 2. OLEDBURN-IN PROTECTION MECHANISM ---
        function runPixelShift() {
            const shiftX = Math.floor(Math.random() * 7) - 3;
            const shiftY = Math.floor(Math.random() * 7) - 3;
            document.documentElement.style.setProperty('--shift-x', `${shiftX}px`);
            document.documentElement.style.setProperty('--shift-y', `${shiftY}px`);
        }
        setInterval(runPixelShift, 60000);

        // --- SCREEN WAKE LOCK ENGINE ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn(`Wake Lock Fehler: ${err.message}`);
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // --- ADAPTIVE DIMMING & BRIGHTNESS ANALYSIS ENGINE ---
        function analyzeArtworkBrightness(img) {
            try {
                offscreenCtx.drawImage(img, 0, 0, 10, 10);
                const imgData = offscreenCtx.getImageData(0, 0, 10, 10);
                const data = imgData.data;
                
                let colorSum = 0;
                for (let x = 0; x < data.length; x += 4) {
                    let r = data[x];
                    let g = data[x + 1];
                    let b = data[x + 2];
                    // Relative Leuchtdichte-Formel
                    let avg = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    colorSum += avg;
                }
                detectedBrightness = colorSum / 100; // Durchschnitt von 100 Pixeln (0 - 255)
            } catch (e) {
                // CORS-Fehler oder Canvas blockiert -> Standard-Dimmungsstufe
                console.warn("Lokal-Bildanalyse blockiert oder fehlgeschlagen. Standard-Dimmungsstufe wird angewendet.");
                detectedBrightness = 127;
            }
            applyAdaptiveDimming();
        }

        function applyAdaptiveDimming() {
            const isOledMode = mBody.classList.contains('oled-night-mode');
            let finalBrightnessPercent = 100;

            if (isOledMode) {
                // Helle Farben -> Stärker abgedunkelt (adaptiveFactor sinkt auf bis zu 0.5)
                // Dunkle Farben -> Weniger abgedunkelt (adaptiveFactor bleibt nahe 1.0)
                let adaptiveFactor = 1.0 - (detectedBrightness / 255) * 0.5;

                // Grundstärke aus den 3 user-definierten Stufen
                let baseMultiplier = dimLevels[currentDimLevelIndex].multiplier;

                // Zusätzlicher Abdunklungs-Faktor im OLED-Nightmode (60% der Standard-Helligkeit)
                let oledFactor = 0.6;

                // Finale Helligkeit in Prozent berechnen und runden
                finalBrightnessPercent = Math.round(adaptiveFactor * baseMultiplier * oledFactor * 100);

                // Schutz vor komplett schwarzem Screen (Klemmen zwischen 5% und 100%)
                finalBrightnessPercent = Math.max(5, Math.min(100, finalBrightnessPercent));
            } else {
                // Wenn kein OLED-Modus aktiv ist -> Volle Helligkeit (100%)
                finalBrightnessPercent = 100;
            }

            // Direktes CSS-Injektion zur Laufzeit
            tvArtwork.style.filter = `brightness(${finalBrightnessPercent}%)`;
            tvCanvasVideo.style.filter = `brightness(${finalBrightnessPercent}%)`;

            // Button-Text aktualisieren
            if (dimToggleBtn) {
                if (isOledMode) {
                    dimToggleBtn.innerHTML = `🌑 Dim: ${dimLevels[currentDimLevelIndex].name} (${finalBrightnessPercent}%)`;
                } else {
                    dimToggleBtn.innerHTML = `🌑 Dim: Bereit (${dimLevels[currentDimLevelIndex].name})`;
                }
            }
        }

        // --- BUTTON INTERACTIVE LISTENERS ---
        oledToggleBtn.addEventListener('click', () => {
            mBody.classList.toggle('oled-night-mode');
            if(mBody.classList.contains('oled-night-mode')) {
                oledToggleBtn.textContent = "👁️ OLED Black";
            } else {
                oledToggleBtn.textContent = "✨ Normal";
            }
            applyAdaptiveDimming(); // Aktualisiert die Cover-Helligkeit sofort
        });

        if (dimToggleBtn) {
            dimToggleBtn.addEventListener('click', () => {
                currentDimLevelIndex = (currentDimLevelIndex + 1) % dimLevels.length;
                applyAdaptiveDimming();
            });
        }

        // Event-Listener zum Berechnen der Helligkeit sobald das Bild vollständig geladen ist
        tvArtwork.addEventListener('load', () => {
            analyzeArtworkBrightness(tvArtwork);
        });

        // --- 3. ADVANCED TIME PARSING ENGINE ---
        function formatTime(ms) {
            if (!ms || ms < 0) return "0:00";
            const totalSeconds = Math.floor(ms / 1000);
            return `${Math.floor(totalSeconds / 60)}:${(totalSeconds % 60).toString().padStart(2, '0')}`;
        }

        function parseLrc(lrcString) {
            const lines = lrcString.split('\n');
            const lineRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;
            const enhancedRegex = /<(\d{2}):(\d{2})\.(\d{2,3})>([^<]*)/g;
            parsedLyrics = [];
            
            lines.forEach(line => {
                const match = lineRegex.exec(line);
                if (match) {
                    const m = parseInt(match[1]);
                    const s = parseInt(match[2]);
                    const msStr = match[3];
                    const ms = msStr.length === 2 ? parseInt(msStr) * 10 : parseInt(msStr);
                    const lineTime = (m * 60000) + (s * 1000) + ms;
                    const rawText = match[4];
                    
                    let tokens = [];
                    let hasWordTimings = false;

                    if (/<(\d{2}):(\d{2})\.(\d{2,3})>/.test(rawText)) {
                        hasWordTimings = true;
                        let firstTagIdx = rawText.indexOf('<');
                        if (firstTagIdx > 0) {
                            let initialText = rawText.substring(0, firstTagIdx); 
                            if (initialText.trim()) tokens.push({ timeMs: lineTime, text: initialText });
                        }
                        const matches = [...rawText.matchAll(enhancedRegex)];
                        matches.forEach(wm => {
                            const wm_ms = wm[3].length === 2 ? parseInt(wm[3]) * 10 : parseInt(wm[3]);
                            tokens.push({ timeMs: (parseInt(wm[1]) * 60000) + (parseInt(wm[2]) * 1000) + wm_ms, text: wm[4] }); 
                        });
                    } else {
                        const cleanText = rawText.replace(/<\d{2}:\d{2}\.\d{2,3}>/g, '').trim();
                        if (cleanText) {
                            const words = cleanText.match(/([^\s\-]+[\s\-]*|[\s\-]+)/g) || [cleanText];
                            tokens = words.map(w => ({ timeMs: null, text: w }));
                        } else {
                            tokens = [{ timeMs: lineTime, text: "♪" }];
                        }
                    }

                    parsedLyrics.push({ 
                        timeMs: lineTime, 
                        text: rawText.replace(/<\d{2}:\d{2}\.\d{2,3}>/g, '').trim() || "♪",
                        tokens: tokens,
                        hasWordTimings: hasWordTimings
                    });
                }
            });

            parsedLyrics.sort((a, b) => a.timeMs - b.timeMs);
            
            for (let i = 0; i < parsedLyrics.length; i++) {
                let line = parsedLyrics[i];
                let timeToNextLine = 4000;
                if (i < parsedLyrics.length - 1) {
                    timeToNextLine = Math.min(parsedLyrics[i+1].timeMs - line.timeMs, 10000);
                }
                
                if (!line.hasWordTimings && line.tokens.length > 0) {
                    let segment = (timeToNextLine * 0.85) / line.tokens.length;
                    line.tokens.forEach((tok, idx) => {
                        tok.timeMs = line.timeMs + (idx * segment);
                        tok.duration = segment;
                    });
                } else if (line.hasWordTimings) {
                    line.tokens.forEach((tok, idx) => {
                        let next = line.tokens[idx+1];
                        tok.duration = next ? (next.timeMs - tok.timeMs) : 1000;
                    });
                }
            }
        }

        // --- LAYOUT ADAPTER (CENTER MODE VS NORMAL MODE) ---
        function updateLayoutMode(hasLyrics) {
            if (!hasLyrics) {
                // Keine Lyrics -> Zentrieren und vergrößern
                mainLayout.classList.remove('justify-between');
                mainLayout.classList.add('justify-center');
                
                leftPanel.classList.remove('md:w-[42%]', 'md:items-start', 'text-center', 'md:text-left');
                leftPanel.classList.add('md:w-[60%]', 'max-w-2xl', 'items-center', 'text-center');
                
                coverWrapper.classList.remove('md:max-w-[420px]');
                coverWrapper.classList.add('md:max-w-[520px]', 'scale-105');
                
                rightPanel.classList.add('hidden');
            } else {
                // Lyrics am Start -> Normales Split-Screen-Layout
                mainLayout.classList.remove('justify-center');
                mainLayout.classList.add('justify-between');
                
                leftPanel.classList.remove('md:w-[60%]', 'max-w-2xl', 'items-center', 'text-center');
                leftPanel.classList.add('md:w-[42%]', 'md:items-start', 'text-center', 'md:text-left');
                
                coverWrapper.classList.remove('md:max-w-[520px]', 'scale-105');
                coverWrapper.classList.add('md:max-w-[420px]');
                
                rightPanel.classList.remove('hidden');
            }
        }

        // --- 4. RENDER & DYNAMIC ANIMATION ENGINE ---
        function renderLyrics(staticText, isUnsynced = false) {
            if (!lyricsContentEngine) return;
            
            // Wenn keine geladenen Lyrics da sind, triggern wir das Center-Layout
            if (parsedLyrics.length === 0) {
                updateLayoutMode(false);
                lyricsContentEngine.innerHTML = '';
                lyricElementsCache = [];
                return;
            }

            // Wenn Text existiert, spalten wir das Layout wieder auf
            updateLayoutMode(true);
            
            let html = `<div class="w-full pt-[25vh] pb-[35vh]">`;
            parsedLyrics.forEach((line, idx) => {
                html += `<div id="lyric-line-${idx}" class="lyric-line text-xl xs:text-2xl md:text-4xl lg:text-5xl font-black my-6 leading-tight text-left">`;
                line.tokens.forEach((tok, wIdx) => {
                    html += `<span id="word-${idx}-${wIdx}" class="lyric-word">${tok.text}</span>`;
                });
                html += `</div>`;
            });
            html += `</div>`;
            
            lyricsContentEngine.innerHTML = html;

            // DOM-Knoten-Cache anlegen: Minimiert DOM-Lookups im Animationsframe auf NULL
            lyricElementsCache = parsedLyrics.map((line, idx) => {
                return {
                    lineEl: document.getElementById(`lyric-line-${idx}`),
                    wordEls: line.tokens.map((tok, wIdx) => document.getElementById(`word-${idx}-${wIdx}`))
                };
            });
        }

        function syncLyricsUI() {
            if (parsedLyrics.length === 0 || lyricElementsCache.length === 0) return;
            const syncMs = currentMs + liveSyncOffset;

            let activeLineIdx = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (syncMs >= parsedLyrics[i].timeMs) activeLineIdx = i;
                else break;
            }

            // Neue aktive Zeile triggern (Optimiert: Keine document.querySelectorAll Abfragen mehr!)
            if (activeLineIdx !== currentLyricIndex) {
                // Vorherige Zeile deaktivieren
                if (currentLyricIndex !== -1 && lyricElementsCache[currentLyricIndex]) {
                    lyricElementsCache[currentLyricIndex].lineEl.classList.remove('active');
                }
                
                currentLyricIndex = activeLineIdx;
                
                if (currentLyricIndex !== -1 && lyricElementsCache[currentLyricIndex]) {
                    const activeEl = lyricElementsCache[currentLyricIndex].lineEl;
                    activeEl.classList.add('active');
                    
                    const containerHeight = lyricsContainer.clientHeight;
                    lyricsContainer.scrollTo({ 
                        top: activeEl.offsetTop - (containerHeight / 2) + (activeEl.clientHeight / 2), 
                        behavior: 'smooth' 
                    });
                }
            }

            // CSS Custom Property nur setzen, wenn sich der Wert geändert hat (Vermeidet unzählige Repaints)
            if (currentLyricIndex !== -1 && lyricElementsCache[currentLyricIndex]) {
                const line = parsedLyrics[currentLyricIndex];
                const cachedWords = lyricElementsCache[currentLyricIndex].wordEls;
                
                line.tokens.forEach((tok, wIdx) => {
                    const wordSpan = cachedWords[wIdx];
                    if (!wordSpan) return;

                    let percent = 0;
                    if (syncMs >= tok.timeMs + tok.duration) percent = 100;
                    else if (syncMs > tok.timeMs) percent = ((syncMs - tok.timeMs) / tok.duration) * 100;

                    const pctString = `${Math.round(percent)}%`;
                    // Nur ins CSS schreiben, wenn sich der mathematische Wert verändert hat
                    if (wordSpan.getAttribute('data-pct') !== pctString) {
                        wordSpan.style.setProperty('--fill-percent', pctString);
                        wordSpan.setAttribute('data-pct', pctString);
                    }
                });
            }
        }

        function animateLoop() {
            if (trackIsPlaying) {
                currentMs = serverBaseProgress + (performance.now() - localStartTime);
                if (totalMs > 0 && currentMs > totalMs) currentMs = totalMs;
                
                // --- TIMELINE RUNTIME RE-CALCULATION (SINK WITH OFFSET) ---
                const syncedProgressMs = Math.max(0, Math.min(currentMs + liveSyncOffset, totalMs));

                // Optimierung: Nur aktualisieren, wenn sich die formatierte Zeit verändert hat (jede Sekunde statt 60fps)
                const timeString = formatTime(syncedProgressMs);
                if (tvTimeCurrent.textContent !== timeString) {
                    tvTimeCurrent.textContent = timeString;
                }

                if (tvProgressBar && totalMs > 0) {
                    const progressPercent = `${(syncedProgressMs / totalMs) * 100}%`;
                    if (tvProgressBar.style.width !== progressPercent) {
                        tvProgressBar.style.width = progressPercent;
                    }
                }

                syncLyricsUI();
                requestAnimationFrame(animateLoop);
            }
        }

        // --- 5. DATA INGESTION ENGINE WITH LATENCY RECOVERY ---
        let currentFetchId = 0;
        let offlineTimeout = null;

        function updateMusicUI(data) {
            const hasTrack = data && data.track;
            const isPlaying = data && data.status === "playing";

            if (!hasTrack || !isPlaying) {
                trackIsPlaying = false;
                if (!offlineTimeout) {
                    offlineTimeout = setTimeout(() => {
                        mBody.classList.remove('playing');
                        tvPlaceholder.classList.remove('opacity-0');
                        tvArtwork.src = ""; // Flush Image Source
                        tvArtwork.classList.add('opacity-0');
                        tvCanvasVideo.classList.add('opacity-0');
                        tvTitle.textContent = "Aktuell ist es ruhig...";
                        tvArtist.textContent = "Genieße die Stille";
                        ambientBgLayer.style.backgroundImage = 'none';
                        statusBadgeText.textContent = "Zen Mode";
                        parsedLyrics = [];
                        renderLyrics();
                        
                        // Timeline & Spotify-Badge ausblenden bei Offline
                        tvProgressEngine.classList.add('hidden');
                        spotifyBadge.classList.add('hidden');
                        
                        // Zurücksetzen der Helligkeitsvariable bei Offline-Zustand
                        detectedBrightness = 127;
                        applyAdaptiveDimming();
                    }, 2000);
                }
                return;
            }

            clearTimeout(offlineTimeout);
            offlineTimeout = null;
            mBody.classList.add('playing');

            // Timeline & Spotify-Badge einblenden
            tvProgressEngine.classList.remove('hidden');
            spotifyBadge.classList.remove('hidden');

            const cleanArtist = data.track.artist.replace(/\s*•\s*From Smart Shuffle/gi, '').trim();
            const trackId = data.track.title + "-" + cleanArtist;
            const isNewTrack = (trackId !== currentTrackId);

            let progress = data.progress_ms !== undefined ? data.progress_ms : (data.track.progress_ms || 0);
            if (data.timestamp && isPlaying) {
                const normalizedLocalNow = Date.now() - apiTimeDelta;
                const apiEventAge = normalizedLocalNow - new Date(data.timestamp).getTime();
                progress += Math.max(0, apiEventAge) + lastPingLatency;
            }

            if (tvTitle.textContent !== data.track.title) tvTitle.textContent = data.track.title;
            if (tvArtist.textContent !== data.track.artist) tvArtist.textContent = data.track.artist;
            if (statusBadgeText.textContent !== (data.provider || "Streaming")) statusBadgeText.textContent = data.provider || "Streaming";
            
            totalMs = data.track.duration_ms || 0;
            const totalTimeString = formatTime(totalMs);
            if (tvTimeTotal.textContent !== totalTimeString) tvTimeTotal.textContent = totalTimeString;

            if (tvArtwork.src !== data.track.artwork_url) {
                tvArtwork.crossOrigin = "anonymous";
                tvArtwork.src = data.track.artwork_url || "";
                tvArtwork.classList.remove('opacity-0');
                tvPlaceholder.classList.add('opacity-0');
                ambientBgLayer.style.backgroundImage = `url('${data.track.artwork_url}')`;
            }

            const canvasUrl = data.track.canvas_url || null;
            if (canvasUrl && tvCanvasVideo.src !== canvasUrl) {
                tvCanvasVideo.src = canvasUrl;
                tvCanvasVideo.classList.remove('opacity-0');
                tvCanvasVideo.play().catch(()=>{});
            } else if (!canvasUrl) {
                tvCanvasVideo.classList.add('opacity-0');
            }

            if (isNewTrack) {
                currentTrackId = trackId;
                serverBaseProgress = progress;
                localStartTime = performance.now();
                currentMs = progress;
                trackIsPlaying = isPlaying;
                
                fetchLyricsFromAPIs(data.track.title, cleanArtist);
            } else {
                const currentLocalEst = serverBaseProgress + (performance.now() - localStartTime);
                if (Math.abs(currentLocalEst - progress) > 400) {
                    serverBaseProgress = progress;
                    localStartTime = performance.now();
                }
                trackIsPlaying = isPlaying;
            }

            if (trackIsPlaying) requestAnimationFrame(animateLoop);
        }

        async function fetchLyricsFromAPIs(title, artist) {
            const fetchId = ++currentFetchId;
            parsedLyrics = [];
            currentLyricIndex = -1;

            try {
                let res = await fetch(`https://lrclib.net/api/get?` + new URLSearchParams({ track_name: title, artist_name: artist }));
                if (fetchId !== currentFetchId) return;
                if (res.ok) {
                    let data = await res.json();
                    if (data.syncedLyrics) {
                        parseLrc(data.syncedLyrics);
                        renderLyrics();
                        return;
                    }
                }
                throw new Error("LrcLib standard failed");
            } catch(e) {
                try {
                    let searchRes = await fetch(`https://neteasecloudmusicapi.vercel.app/search?keywords=${encodeURIComponent(title + ' ' + artist)}`);
                    if (fetchId !== currentFetchId) return;
                    let searchData = await searchRes.json();
                    let songId = searchData.result?.songs?.[0]?.id;
                    if (songId) {
                        let lyricRes = await fetch(`https://neteasecloudmusicapi.vercel.app/lyric?id=${songId}`);
                        let lyricData = await lyricRes.json();
                        if (lyricData.lrc?.lyric) {
                            parseLrc(lyricData.lrc.lyric);
                            renderLyrics();
                            return;
                        }
                    }
                } catch(err) { console.error("All lyric APIs exhausted."); }
                
                // Fallback: Keine Lyrics gefunden -> Layout anpassen
                renderLyrics();
            }
        }

        function pipelineTrigger() {
            let pStart = performance.now();
            fetch('https://npc-api.aikins.xyz/v1/users/gamingpig/now')
                .then(r => r.json())
                .then(data => {
                    lastPingLatency = (performance.now() - pStart) / 2;
                    updateMusicUI(data);
                })
                .catch(()=>{});
        }

        if (tvSyncSlider) {
            tvSyncSlider.addEventListener('input', (e) => { liveSyncOffset = parseInt(e.target.value); });
        }

        // --- ENGINE INITIALIZATION ---
        (async () => {
            await syncWorldwideTime();
            pipelineTrigger();
            await requestWakeLock();
            setInterval(pipelineTrigger, 3000); 
            setInterval(syncWorldwideTime, 300000); 
        })();
    </script>
